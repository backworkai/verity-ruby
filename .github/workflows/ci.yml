name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    name: Ruby ${{ matrix.ruby-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby-version: ["2.7", "3.0", "3.1", "3.2", "3.3", "3.4"]

    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Syntax check
        run: ruby -c lib/verity.rb

      - name: Build gem
        run: gem build verity-sdk.gemspec

      - name: Verify load path
        run: bundle exec ruby -Ilib -e "require 'verity'; puts Verity::VERSION"
